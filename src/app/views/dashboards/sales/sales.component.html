<div class="container-fluid"> <!-- Encabezado -->
  <div class="row">
    <div class="col-12">
      <div
        class="page-title-head d-flex flex-column flex-sm-row align-items-start align-items-sm-center justify-content-between gap-3">
        <div class="flex-grow-1 text-sm-start text-center">
          <h4 class="fs-18 fw-semibold m-0">Informes</h4>
        </div>
        <div class="w-100 w-sm-auto">
          <form action="javascript:void(0);">
            <div class="row g-2 align-items-center justify-content-center justify-content-sm-end">
              <div class="col-12 col-sm-auto" style="min-width: 180px;"> <select selectFormInput
                  [options]="{ shouldSort: false }" class="form-select w-100" aria-label="Filtrar por zona"
                  name="choices-single-default" id="choices-single-default" formControlName="documentType" data-choices
                  data-choices-sorting-false>
                  <option value="zona1">Zona 1</option>
                  <option value="zona2">Zona 2</option>
                  <option value="zona3">Zona 3</option>
                  <option value="zona4">Zona 4</option>
                </select> </div>
              <div class="col-12 col-sm-auto">
                <div class="input-group"> <input mwlFlatpickr [flatpickrOptions]="{mode:'range'}"
                    placeholder="01 May to 31 May" type="text" class="form-control border-0 shadow"
                    data-provider="flatpickr" data-deafult-date="01 May to 31 May" data-date-format="d M"
                    data-range-date="true" /> <span class="input-group-text text-white"
                    style="background-color: #DC3545; border-color: #DC3545;">
                    <i class="ti ti-calendar fs-15"></i>
                  </span>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div> <!-- Contenido principal -->
  <div class="row mt-3 g-3">
    <div class="col-12 col-lg-6">
      <app-stats></app-stats>
    </div>
    <!-- Intenciones de credito -->
    <div class="col-12 col-lg-6">
      <div class="card">
        <recent-orders></recent-orders>
      </div>
    </div>
  </div> <!-- Gráfico -->
  <div class="row mt-3">
    <div class="col-12"> <overview-chart></overview-chart> </div>
  </div>
</div>
