<div class="row">
  <div class="col-12">
    <div class="page-title-head d-flex align-items-sm-center flex-sm-row flex-column">
      <div class="flex-grow-1">
        <h4 class="fs-18 fw-semibold m-0">Informes</h4>
      </div>
      <div class="mt-3 mt-sm-0">
        <form action="javascript:void(0);">
          <div class="row g-2 mb-0 align-items-center">
            <div class="col-auto" style="min-width: 200px;">
              <select selectFormInput [options]="{ shouldSort: false }" class="form-select"
                aria-label="Filtrar por zona" name="choices-single-default" id="choices-single-default"
                formControlName="documentType" data-choices data-choices-sorting-false>
                <option value="zona1">Zona 1</option>
                <option value="zona2">Zona 2</option>
                <option value="zona3">Zona 3</option>
                <option value="zona4">Zona 4</option>
              </select>
            </div>

            <div class="col-sm-auto">
              <div class="input-group">
                <input mwlFlatpickr [flatpickrOptions]="{mode:'range'}" placeholder="01 May to 31 May" type="text"
                  class="form-control border-0 shadow" data-provider="flatpickr" data-deafult-date="01 May to 31 May"
                  data-date-format="d M" data-range-date="true">
                <span class="input-group-text bg-primary border-primary text-white">
                  <i class="ti ti-calendar fs-15"></i>
                </span>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-6">
    <app-stats />
  </div>
  <div class="col-6">
    <div class="card">
      <recent-orders />    
    </div>
  </div>
</div>
<div class="row">
  <div class="col-xxl-12 info-sidebar">
    <overview-chart />
  </div>
</div>
