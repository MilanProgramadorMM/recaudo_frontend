<div class="container-fluid"> <!-- Encabezado -->
  <div class="row">
    <div class="col-12">
      <div
        class="page-title-head d-flex flex-column flex-sm-row align-items-start align-items-sm-center justify-content-between gap-3">
        <div class="flex-grow-1 text-sm-start text-center">
          <h4 class="fs-18 fw-semibold m-0">Informes</h4>
        </div>
        <div class="w-100 w-sm-auto">
          <form [formGroup]="filterForm">
            <div class="row g-2 align-items-center justify-content-center justify-content-sm-end">
              <!-- SELECT DE ZONAS -->
              <div class="col-12 col-sm-auto" style="min-width: 180px;">
                <select class="form-select w-100" aria-label="Filtrar por zona" formControlName="zona">
                  <option value="" disabled>Seleccione una zona</option>
                  <option *ngFor="let zona of zonas" [value]="zona.value">
                    {{ zona.value }}
                  </option>
                </select>
              </div>
              <div class="col-12 col-sm-auto">
                <div class="input-group">
                  <input mwlFlatpickr [flatpickrOptions]="flatpickrOptions"
                    placeholder="Seleccione rango de fechas" type="text" class="form-control border-0 shadow"
                    formControlName="dateRange" />
                  <span class="input-group-text text-white" style="background-color: #DC3545; border-color: #DC3545;">
                    <i class="ti ti-calendar fs-15"></i>
                  </span>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- LOADING -->
  <div *ngIf="loading" class="row mt-3">
    <div class="col-12 text-center py-5">
      <div class="spinner-border text-danger" role="status">
        <span class="visually-hidden">Cargando zonas...</span>
      </div>
    </div>
  </div>
  <!-- MENSAJE SI NO HAY ZONAS -->
  <div *ngIf="!loading && zonas.length === 0" class="row mt-3">
    <div class="col-12">
      <div class="alert alert-warning">
        <i class="ti ti-alert-circle me-2"></i>
        No hay zonas disponibles para mostrar información.
      </div>
    </div>
  </div>

  <div class="row mt-3 g-3" *ngIf="!loading && zonas.length > 0">
    <div class="col-12 col-lg-6">
      <app-stats></app-stats>
    </div>
    <!-- Intenciones de credito -->
    <div class="col-12 col-lg-6" *ngIf="currentUserRole?.toLowerCase() !== 'asesor'">
      <div class="card">
        <recent-orders></recent-orders>
      </div>
    </div>
  </div>
  <!-- Gráfico 
  <div class="row mt-3" *ngIf="!loading && zonas.length > 0">
    <div class="col-12">
      <overview-chart></overview-chart>
    </div>
  </div> -->
</div>
