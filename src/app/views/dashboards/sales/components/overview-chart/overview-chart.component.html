<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h4 class="header-title fw-bold">Resumen por zona</h4>
  </div>

  <!-- LOADING -->
  <div *ngIf="loading" class="bg-light bg-opacity-50 py-5 text-center">
    <div class="spinner-border text-danger" role="status">
      <span class="visually-hidden">Cargando datos...</span>
    </div>
  </div>

  <!-- DATOS -->
  <div *ngIf="!loading" class="bg-light bg-opacity-50">
    <div class="row text-center">
      @for (item of overViewData; track $index) {
      <div class="col-md-4 col-6">
        <p class="text-muted mt-3 mb-1">{{item.title}}</p>
        <h4 class="mb-3">
          <span class="ti {{item.icon}} text-{{item.variant}} me-1"></span>
          <!-- ✅ Mostrar valor formateado sin la "k" -->
          <span>{{currency}} {{item.count}}</span>
        </h4>
      </div>
      }
    </div>
  </div>

  <div class="card-body pt-0">
    <div dir="ltr">
      <apx-chart [xaxis]="overViewChartOpts.xaxis!" [yaxis]="overViewChartOpts.yaxis!" [grid]="overViewChartOpts.grid!"
        [legend]="overViewChartOpts.legend!" [plotOptions]="overViewChartOpts.plotOptions!"
        [chart]="overViewChartOpts.chart!" [series]="overViewChartOpts.series!" [stroke]="overViewChartOpts.stroke!"
        [fill]="overViewChartOpts.fill!" [markers]="overViewChartOpts.markers!" [colors]="overViewChartOpts.colors!"
        [tooltip]="overViewChartOpts.tooltip!" />
    </div>
  </div>
</div>
