<h3 class="fw-semibold mb-2">Inicio de Sesion</h3>

<p class="text-muted mb-4">Ingrese su usuario y contraseña para iniciar sesion.</p>

<!--<third-party-login/>-->

<!-- <p class="fs-13 fw-semibold">Or Login With Email</p> -->

<p *ngIf="errorMessage.length>0" class="fs-14 text-danger">{{ errorMessage }}</p>

<form [formGroup]="signInForm" (ngSubmit)="login()" class="text-start mb-3">
  <div class="mb-3">
    <label class="form-label" for="example-username">Usuario</label>
    <input formControlName="username" type="text" id="example-username" class="form-control"
           placeholder="Ingresa tu usuario" [ngClass]="{ 'is-invalid': submitted && formValues?.['username'].errors }">
  </div>

  <div class="mb-3">
    <label class="form-label" for="example-password">Contraseña</label>
    <input type="password" formControlName="password" id="example-password" class="form-control"
           placeholder="Ingresa tu contraseña" [ngClass]="{ 'is-invalid': submitted && formValues?.['password'].errors }">
  </div>

  <div class="d-flex justify-content-between mb-3">
    <!--<div class="form-check">
      <input type="checkbox" class="form-check-input" id="checkbox-signin">
      <label class="form-check-label" for="checkbox-signin">Remember me</label>
    </div> -->

    <a routerLink="/auth/recover-password" class="text-muted border-bottom border-dashed">Olvide mi contraseña</a>
  </div>

  <div class="d-grid">
    <button class="btn btn-primary" type="submit">Ingresar</button>
  </div>
</form>
