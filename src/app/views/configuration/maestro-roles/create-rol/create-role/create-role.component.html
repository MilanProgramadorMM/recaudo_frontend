<div class="modal-header">
    <h5 class="modal-title">Crear Rol</h5>
    <button type="button" class="btn-close" (click)="cancel()"></button>
</div>

<div class="modal-body">
    <p *ngIf="errorMessage" class="fs-14 text-danger">{{ errorMessage }}</p>

    <form [formGroup]="form" class="row">
        <div class="col-lg-12">
            <div class="card">
                <div class="card-header border-bottom border-dashed">
                    <h4 class="card-title mb-0">Información del Rol</h4>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Nombre del rol <span class="required">*</span></label>
                        <input formControlName="name" type="text" class="form-control text-uppercase"
                            [ngClass]="{ 'is-invalid': submitted && form.get('name')?.invalid }">
                        <div class="invalid-feedback" *ngIf="submitted && form.get('name')?.errors?.['required']">
                            Campo obligatorio
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <input formControlName="description" type="text" class="form-control text-uppercase">
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-danger" (click)="cancel()">Cancelar</button>
                        <button class="btn btn-primary me-1" (click)="saveRole()" [disabled]="loading">
                            {{ loading ? 'Guardando...' : 'Crear' }}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>



<!-- ALERTA DE ÉXITO -->
<ng-template #successalert let-modal>
    <div class="modal-filled bg-success">
        <div class="modal-body p-4 text-center">
            <i class="ti ti-check h1"></i>
            <h4 class="mt-2">¡Bien hecho!</h4>
            <p class="mt-3">¡Rol creado correctamente! 🎉</p>
            <button (click)="onSuccessContinue(modal)" type="button" class="btn btn-light my-2">
                Continuar
            </button>
        </div>
    </div>
</ng-template>

<!-- ALERTA DE ERROR -->
<ng-template #erroralert let-modal>
    <div class="modal-filled bg-danger">
        <div class="modal-body p-4 text-center text-white">
            <i class="ti ti-alert-circle h1"></i>
            <h4 class="mt-2">Ocurrió un error</h4>
            <p class="mt-3">{{ lastErrorMessage || 'No se pudo crear el rol. Intenta nuevamente.' }}</p>
            <button (click)="modal.dismiss()" type="button" class="btn btn-light my-2">
                Cerrar
            </button>
        </div>
    </div>
</ng-template>
