<div class="modal-header">
  <h5 class="modal-title">{{ isEditMode ? 'Editar' : 'Nuevo' }} {{ type | titlecase }}</h5>
  <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
</div>

<div class="modal-body">
  <p *ngIf="errorMessage" class="fs-14 text-danger">{{ errorMessage }}</p>

  <form #form="ngForm" (ngSubmit)="save(form)">
    <div class="mb-3">
      <label>Nombre <span class="required">*</span></label>
      <input type="text" class="form-control text-uppercase" [(ngModel)]="nombre" name="nombre" required
        [ngClass]="{ 'is-invalid': submitted && form.submitted && form.controls['nombre']?.invalid }" />
      <div class="invalid-feedback" *ngIf="submitted && form.controls['nombre']?.errors?.['required']">
        Campo obligatorio
      </div>
    </div>

    <div class="mb-3">
      <label>Descripción</label>
      <input type="text" class="form-control text-uppercase " [(ngModel)]="descripcion" name="descripcion" />
    </div>

    <!-- Selección dinámica -->
    <div class="mb-3" *ngIf="type === 'departamento'">
      <label>País <span class="required">*</span></label>
      <select class="form-select" [(ngModel)]="paisId" name="paisId" required>
        <option *ngFor="let p of paises" [value]="p.id">{{ p.label }}</option>
      </select>
    </div>

    <div class="mb-3" *ngIf="type === 'municipio'">
      <label>Departamento <span class="required">*</span></label>
      <select class="form-select" [(ngModel)]="departamentoId" name="departamentoId" required>
        <option *ngFor="let d of departamentos" [value]="d.id">{{ d.nombre }}</option>
      </select>
    </div>

    <div class="mb-3" *ngIf="type === 'barrio'">
      <label>Municipio <span class="required">*</span></label>
      <select class="form-select" [(ngModel)]="municipioId" name="municipioId" required>
        <option *ngFor="let m of municipios" [value]="m.id">{{ m.nombre }}</option>
      </select>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-danger" (click)="cancel()">Cancelar</button>
      <button class="btn btn-primary me-1" type="submit" [disabled]="loading">
        {{ loading ? 'Guardando...' : (isEditMode ? 'Actualizar' : 'Crear') }}
      </button>
    </div>
  </form>
</div>

<!-- Alerta de éxito -->
<ng-template #successAlert let-modal>
  <div class="modal-filled bg-success">
    <div class="modal-body p-4 text-center">
      <i class="ti ti-check h1"></i>
      <h4 class="mt-2">{{ successMessage || '¡Bien hecho!' }}</h4>
      <p class="mt-3">{{ successDetails || 'Operación realizada correctamente 🎉' }}</p>
      <button (click)="onSuccessContinue(modal)" type="button" class="btn btn-light my-2">
        Continuar
      </button>
    </div>
  </div>
</ng-template>

<!-- Alerta de error -->
<ng-template #errorAlert let-modal>
  <div class="modal-filled bg-danger">
    <div class="modal-body p-4 text-center text-white">
      <i class="ti ti-alert-circle h1"></i>
      <h4 class="mt-2">Ocurrió un error</h4>
      <p class="mt-3">
        {{ lastErrorMessage }}
      </p>
      <button (click)="modal.dismiss()" type="button" class="btn btn-light my-2">
        Cerrar
      </button>
    </div>
  </div>
</ng-template>
