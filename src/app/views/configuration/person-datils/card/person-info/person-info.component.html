<div class="card">
    <div class="card-body" [formGroup]="form"> 
        <div class="d-flex align-items-center gap-2">
            <img src="assets/images/users/avatar-5.jpg" alt=""
                class="avatar-xl rounded-circle border border-light border-2">
            <div>
                <h4 class="text-dark fw-medium">{{ person.full_name }}</h4>
                <!-- <p class="mb-0 text-muted">ID: PS49201</p>-->
            </div>

        </div>

        <div class="mt-3">
            <h4 class="fs-15">Agregar nueva información de contacto :</h4>
            <div class="row mt-1 g-9">
                <div class="col-lg-12 mb-9">
                    <label class="form-label">
                        Seleccione el tipo de información a registrar <span class="required">*</span>
                    </label>
                    <select class="form-control form-select" formControlName="typeInfo">
                        <option value="">Seleccione</option>
                        <option *ngFor="let type of parametersGlotypes" [value]="type.key">
                            {{ type.name }}
                        </option>
                    </select>
                    <div class="invalid-feedback" *ngIf="submitted && form.get('typeInfo')?.errors?.['required']">
                        Campo obligatorio
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-3">
            <!-- Dirección -->
            <div *ngIf="form.value.typeInfo === 'DIR'">
                <div class="row mt-2">
                    <div class="col-lg-12">
                        <label class="form-label">Dirección</label>
                        <input type="text" class="form-control" formControlName="direccion"
                            placeholder="Ingrese dirección" />
                        <div class="invalid-feedback" *ngIf="submitted && form.get('direccion')?.errors?.['required']">
                            Campo obligatorio
                        </div>
                    </div>

                    <div class="col-lg-12 mt-2">
                        <label class="form-label">País</label>
                        <select class="form-control form-select" formControlName="pais">
                            <option value="">Seleccione</option>
                            <option *ngFor="let p of paises" [ngValue]="p.id">{{ p.label }}</option>
                        </select>
                        <div class="invalid-feedback" *ngIf="submitted && form.get('pais')?.errors?.['required']">
                            Campo obligatorio
                        </div>
                    </div>

                    <div class="col-lg-12 mt-2">
                        <label class="form-label">Departamento</label>
                        <select class="form-control form-select" formControlName="departamento">
                            <option value="">Seleccione</option>
                            <option *ngFor="let d of departamentos" [ngValue]="d.id">{{ d.label }}</option>
                        </select>
                    </div>

                    <div class="col-lg-12 mt-2">
                        <label class="form-label">Ciudad o Municipio</label>
                        <select class="form-control form-select" formControlName="ciudad">
                            <option value="">Seleccione</option>
                            <option *ngFor="let c of municipios" [ngValue]="c.id">{{ c.label }}</option>
                        </select>
                    </div>

                    <div class="col-lg-12 mt-2">
                        <label class="form-label">Barrio</label>
                        <select class="form-control form-select" formControlName="barrio">
                            <option value="">Seleccione</option>
                            <option *ngFor="let b of barrios" [ngValue]="b.id">{{ b.label }}</option>
                        </select>
                    </div>


                    <div class="col-lg-12 mt-2">
                        <label class="form-label">Descripcion</label>
                        <input type="text" class="form-control" formControlName="descripcion"
                            placeholder="Ingrese descripcion" />
                    </div>
                </div>
            </div>
            <!-- Teléfono o celular -->
            <div *ngIf="form.value.typeInfo === 'TEL' || form.value.typeInfo === 'CEL'">
                <label class="form-label">
                    {{ form.value.typeInfo === 'TEL' ? 'Teléfono' : 'Celular' }}
                </label>
                <input type="tel" class="form-control" formControlName="telefono" placeholder="Ingrese solo números"
                    pattern="[0-9]*" inputmode="numeric" (keypress)="soloNumeros($event)" />
            </div>



            <div *ngIf="form.value.typeInfo === 'COR'">
                <label class="form-label">Correo</label>
                <input type="email" class="form-control" formControlName="correo" placeholder="Ingrese correo" />
            </div>
        </div>

        <!-- Botón -->
        <div class="mt-3">
            <button class="btn btn-primary" (click)="onSubmit()" [disabled]="form.invalid">
                Guardar
            </button>
        </div>

    </div>
</div>

<!-- ...tu formulario tal cual... -->

<!-- Modal éxito -->
<ng-template #successalert let-modal>
    <div class="modal-body text-center">
        <div class="mb-2">
            <i class="ti ti-circle-check fs-40 text-success"></i>
        </div>
        <h5 class="mb-1">¡Guardado!</h5>
        <p class="mb-3">La información de contacto se creó correctamente.</p>
        <button type="button" class="btn btn-success" (click)="modal.close()">Aceptar</button>
    </div>
</ng-template>

<!-- Modal error -->
<ng-template #erroralert let-modal>
    <div class="modal-body text-center">
        <div class="mb-2">
            <i class="ti ti-alert-triangle fs-40 text-danger"></i>
        </div>
        <h5 class="mb-1">Ups, hubo un problema</h5>
        <p class="mb-1">{{ errorMessage }}</p>
        <small class="text-muted" *ngIf="lastErrorMessage">{{ lastErrorMessage }}</small>
        <div class="mt-3">
            <button type="button" class="btn btn-danger" (click)="modal.close()">Cerrar</button>
        </div>
    </div>
</ng-template>
