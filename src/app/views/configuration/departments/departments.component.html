<page-title title="Departamentos" subtitle="Maestros" />

<div class="row">
  <div class="col-12">
    <div class="card">
      <div class="card-header d-flex align-items-center justify-content-between border-bottom border-light">
        <h4 class="header-title">Departamentos</h4>
        <div>
          <button (click)="openDepartmentModal()" class="btn btn-danger bg-gradient me-1">
            <i class="ti ti-plus me-1"></i> Agregar
          </button>
        </div>
      </div>

      <div class="mb-3 row align-items-center ms-3">
        <label for="department-search" class="col-sm-auto col-form-label">Buscar:</label>
        <div class="col-6">
          <input id="department-search" class="form-control text-uppercase" type="text"
            placeholder="Por nombre o país..." [(ngModel)]="searchTerm" (ngModelChange)="applyFilter()" />
        </div>
      </div>

      <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
        <div *ngIf="loading" class="text-center my-3">
          <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
          <span class="ms-2">Cargando departamentos...</span>
        </div>
        <table *ngIf="!loading" class="table table-nowrap mb-0">
          <thead class="table-dark bg-light-subtle" style="position: sticky; top: 0; z-index: 2;">
            <tr>
              <th>Nombre</th>
              <th>País</th>
              <th class="text-center" style="width: 120px;">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let dept of filteredDepartments">
              <td>{{dept.nombre}}</td>
              <td>{{dept.nombrePais}}</td>
              <td class="pe-3">
                <div class="hstack gap-1 justify-content-center">
                  <a (click)="openDepartmentModal(dept)" class="btn btn-soft-success btn-icon btn-sm rounded-circle"
                    title="Actualizar departamento">
                    <i class="ti ti-edit fs-4"></i>
                  </a>
                  <!-- <a (click)="onDeleteDepartamento(dept.id)" class="btn btn-soft-danger btn-icon btn-sm rounded-circle"
                    title="Eliminar departamento">
                    <i class="ti ti-trash fs-4"></i>
                  </a> -->
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="card-footer">
        <div class="d-flex justify-content-end">
          <ngb-pagination [(page)]="page" [pageSize]="pageSize" [collectionSize]="filteredDepartments.length"
            [boundaryLinks]="true" [directionLinks]="true" [ellipses]="true" [maxSize]="5"
            aria-label="Paginación de departamentos">
          </ngb-pagination>
        </div>
      </div>
      
    </div>
  </div>
</div>
