<div class="modal-header">
    <h5 class="modal-title">
        Asignar Rol al Usuario: {{ nombreUsuario |uppercase}}
    </h5>
    <button type="button" class="btn-close" (click)="close()" aria-label="Close"></button>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="table-responsive">
                <table class="table table-nowrap mb-0">
                    <thead class="bg-light-subtle">
                        <tr>
                            <th>Rol</th>
                            <th class="text-center">Asignado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let role of roles">
                            <td>{{ role.rol }}</td>
                            <td>
                                <div
                                    class="form-check form-switch d-flex justify-content-center align-items-center gap-2">
                                    <input class="form-check-input" type="radio" name="userRole" [value]="role.id"
                                        [checked]="selectedRoleId === role.id" (change)="onToggleRole(role.id)" />
                                    <label class="form-check-label">
                                        {{ selectedRoleId === role.id ? 'Asignado' : 'Sin asignar' }}
                                    </label>
                                </div>
                            </td>
                        </tr>

                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
