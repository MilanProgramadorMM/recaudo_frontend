<div class="modal-header">
    <h5 class="modal-title">
        Asignar Rol al Usuario: {{ nombreUsuario | uppercase }}
    </h5>
    <button type="button" class="btn-close" (click)="close()" aria-label="Close"></button>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="table-responsive">
                <table class="table table-nowrap mb-0">
                    <thead class="bg-light-subtle">
                        <tr>
                            <th>Rol</th>
                            <th class="text-center">Asignado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let role of roles">
                            <td>{{ role.rol }}</td>
                            <td>
                                <div
                                    class="form-check form-switch d-flex justify-content-center align-items-center gap-2">
                                    <input class="form-check-input" type="checkbox" role="switch"
                                        [id]="'roleSwitch' + role.id" [checked]="isSelected(role.id)"
                                        (change)="onToggleRole(role.id, $event.target.checked)"
                                        aria-checked="{{ isSelected(role.id) }}"
                                        aria-label="Asignar rol {{ role.rol }}" />
                                    <label class="form-check-label" [for]="'roleSwitch' + role.id">
                                        {{ isSelected(role.id) ? 'Asignado' : 'Sin asignar' }}
                                    </label>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer d-flex justify-content-end gap-2">
                <button class="btn btn-danger" (click)="close()">Cerrar</button>
                <button class="btn btn-primary" type="button" (click)="save()">Guardar</button>
            </div>
        </div>
    </div>
</div>
