<page-title title="Zonas" subtitle="Configuracion" />
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between border-bottom border-light">
                <h4 class="header-title">Zonas</h4>
                <div>
                    <button (click)="openZonaModal()" class="btn btn-success bg-gradient me-1">
                        <i class="ti ti-plus me-1"></i> Agregar
                    </button>
                </div>
            </div>

            <div class="mb-3 row align-items-center ms-3">
                <label for="person-search" class="col-sm-auto col-form-label">Buscar:</label>
                <div class="col-6">
                    <input id="person-search" class="form-control text-uppercase" type="text"
                        placeholder="Por nombre de Zona..." [(ngModel)]="searchTerm" (ngModelChange)="applyFilter()" />
                </div>
            </div>


            <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                <table class="table table-hover table-nowrap mb-0">
                    <thead class="table-dark bg-light-subtle sticky-top">
                        <tr>
                            <th>Zona</th>
                            <th>Descripcion</th>
                            <th>Estado</th>
                            <th class="text-center" style="width: 120px;">Acciones</th>
                        </tr>
                    </thead>

                    <tbody>
                        @for (z of filteredZonas; track $index) {
                        <tr>
                            <td>{{z.value}}</td>
                            <td>{{z.description}}</td>
                            <td>{{z.status}}</td>
                            <td class="pe-3">
                                <div class="hstack gap-1 justify-content-center">
                                    <a (click)="openZonaModal(z.id)"
                                        class="btn btn-soft-warning btn-icon btn-sm rounded-circle"
                                        title="Actualizar Zona">
                                        <i class="ti ti-user-shield fs-4"></i>
                                    </a>

                                    <a (click)="openClientesByZona(z)"
                                        class="btn btn-soft-warning btn-icon btn-sm rounded-circle"
                                        title="Ordenar clientes por zona">
                                        <i class="ti ti-layout-grid fs-4"></i>
                                    </a>
                                    <!-- <a (click)="onDeleteZona(z.id)"
                                        class="btn btn-soft-danger btn-icon btn-sm rounded-circle"
                                        title="Eliminar zona">
                                        <i class="ti ti-trash fs-4"></i>
                                    </a> -->
                                </div>
                            </td>
                        </tr>
                        }
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
