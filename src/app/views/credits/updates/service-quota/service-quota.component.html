<page-title title="Cargos por servicios" subtitle="Actualizaciones" />

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between border-bottom border-light">
                <h4 class="header-title">Cargos por servicios</h4>
                <div>
                    <button (click)="serviceQuotaModal()" class="btn btn-success bg-gradient me-1">
                        <i class="ti ti-plus me-1"></i> Agregar
                    </button>
                </div>
            </div>

            <div class="mb-3 row align-items-center ms-3">
                <label for="period-search" class="col-sm-auto col-form-label">Buscar:</label>
                <div class="col-6">
                    <input id="period-search" class="form-control text-uppercase" type="text"
                        placeholder="Por nombre de descuento..." [(ngModel)]="searchTerm"
                        (ngModelChange)="applyFilter()" />
                </div>
            </div>

            <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                <table class="table table-hover table-nowrap mb-0">
                    <thead class="table-dark bg-light-subtle sticky-top">
                        <tr>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Estado</th>
                            <th class="text-center" style="width: 120px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let cargos of filteredServiceCuota">
                            <td>{{ cargos.name }}</td>
                            <td>{{ cargos.description}}</td>
                            <td>{{ cargos.status }}</td>
                            <td class="pe-3">
                                <div class="hstack gap-1 justify-content-center">
                                    <a (click)="serviceQuotaModal(cargos)"
                                        class="btn btn-soft-success btn-icon btn-sm rounded-circle"
                                        title="Actualizar tipo de descuento">
                                        <i class="ti ti-edit fs-4"></i>
                                    </a>
                                    <a (click)="onDeleteTypeServiceQuota(cargos.id)"
                                        class="btn btn-soft-danger btn-icon btn-sm rounded-circle"
                                        title="Eliminar tipo de descuento">
                                        <i class="ti ti-trash fs-4"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
