<div class="modal-header">
    <h5 class="modal-title">
        {{ lineData?.id ? 'Editar' : 'Registrar' }} Línea de Crédito
    </h5>
    <button type="button" class="btn-close" (click)="cancel()"></button>
</div>

<div class="modal-body">
    <p *ngIf="errorMessage" class="fs-14 text-danger">{{ errorMessage }}</p>

    <form [formGroup]="form">

        <div class="row">
            <div class="col-lg-12 mb-3">
                <label class="form-label">Nombre <span class="required">*</span></label>
                <input formControlName="name" type="text" class="form-control text-uppercase"
                    [ngClass]="{ 'is-invalid': submitted && form.get('name')?.invalid }">
            </div>
        </div>
        <div class="row">
            <div class="col-lg-12 mb-3">
                <label class="form-label">Descripción</label>
                <textarea formControlName="description" class="form-control text-uppercase" rows="2"></textarea>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-3 mb-3">
                <label class="form-label">Cuota mínima <span class="required">*</span></label>
                <input formControlName="min_quota" type="number" class="form-control" min="1" step="1"
                    [ngClass]="{ 'is-invalid': submitted && form.get('min_quota')?.invalid }"
                    (keypress)="validateNumberInput($event)" />
            </div>
            <div class="col-lg-3 mb-3">
                <label class="form-label">Cuota máxima <span class="required">*</span></label>
                <input formControlName="max_quota" type="number" class="form-control" min="1" step="1"
                    [ngClass]="{ 'is-invalid': submitted && form.get('max_quota')?.invalid || form.hasError('quotaInvalid') }"
                    (keypress)="validateNumberInput($event)" />

                <div class="invalid-feedback" *ngIf="submitted && form.hasError('quotaInvalid')">
                    {{ form.errors?.['quotaInvalid'] }}
                </div>
            </div>
            <div class="col-lg-3 mb-3">
                <label class="form-label">Periodo mínimo <span class="required">*</span></label>
                <input formControlName="min_period" type="number" class="form-control" min="1" step="1"
                    [ngClass]="{ 'is-invalid': submitted && form.get('min_period')?.invalid }"
                    (keypress)="validateNumberInput($event)" />
            </div>
            <div class="col-lg-3 mb-3">
                <label class="form-label">Periodo máximo <span class="required">*</span></label>
                <input formControlName="max_period" type="number" class="form-control" min="1" step="1"
                    [ngClass]="{ 'is-invalid': submitted && form.get('max_period')?.invalid || form.hasError('periodInvalid') }"
                    (keypress)="validateNumberInput($event)" />

                <div class="invalid-feedback" *ngIf="submitted && form.hasError('periodInvalid')">
                    {{ form.errors?.['periodInvalid'] }}
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-4 mb-3">
                <label class="form-label">Tipo de tasa <span class="required">*</span></label>
                <select class="form-control form-select" formControlName="tax_type_id"
                    [ngClass]="{ 'is-invalid': submitted && form.get('tax_type_id')?.invalid }">
                    <option value="">Seleccione</option>
                    <option *ngFor="let tax of taxTypes" [value]="tax.id">
                        {{ tax.name }}
                    </option>
                </select>
                <div class="invalid-feedback" *ngIf="submitted && form.get('tax_type_id')?.errors?.['required']">
                    Campo obligatorio
                </div>
            </div>
            <div class="col-lg-4 mb-3">
                <label class="form-label">Tipo de amortización <span class="required">*</span></label>
                <select class="form-control form-select" formControlName="amortization_type_id"
                    [ngClass]="{ 'is-invalid': submitted && form.get('amortization_type_id')?.invalid }">
                    <option value="">Seleccione</option>
                    <option *ngFor="let amort of amortizationTypes" [value]="amort.id">
                        {{ amort.name }}
                    </option>
                </select>
                <div class="invalid-feedback"
                    *ngIf="submitted && form.get('amortization_type_id')?.errors?.['required']">
                    Campo obligatorio
                </div>
            </div>
            <div class="col-lg-4 mb-3">
                <label class="form-label">Nombre de procedimiento</label>
                <input formControlName="procedure_name" type="text" class="form-control text-uppercase">
            </div>
        </div>
        <div class="row">
            <div class="d-flex justify-content-between mb-3">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" formControlName="life_insurance" id="lifeInsurance">
                    <label for="lifeInsurance" class="form-check-label">Seguro de vida</label>
                </div>

                <div class="form-check">
                    <input type="checkbox" class="form-check-input" formControlName="portfolio_insurance"
                        id="portfolioInsurance">
                    <label for="portfolioInsurance" class="form-check-label">Seguro de cartera</label>
                </div>

                <div class="form-check">
                    <input type="checkbox" class="form-check-input" formControlName="require_documentation"
                        id="requireDocumentation">
                    <label for="requireDocumentation" class="form-check-label">Requiere documentación</label>
                </div>

                <div class="form-check">
                    <input type="checkbox" class="form-check-input" formControlName="loan_disbursement" id="loan_disbursement">
                    <label for="loan_disbursement" class="form-check-label">Requiere desembolso</label>
                </div>
            </div>

        </div>

    </form>
</div>

<div class="modal-footer">
    <button class="btn btn-danger" (click)="cancel()">Cancelar</button>
    <button class="btn btn-primary me-1" (click)="saveLine()">{{ lineData?.id ? 'Editar' : 'Registrar' }}</button>
</div>

<!-- ALERTA ÉXITO -->
<ng-template #successalert let-modal>
    <div class="modal-filled bg-success">
        <div class="modal-body p-4 text-center">
            <i class="ti ti-check h1"></i>
            <h4 class="mt-2">¡Bien hecho!</h4>
            <p class="mt-3">{{ successDetails }}</p>
            <button (click)="onSuccessContinue(modal)" type="button" class="btn btn-light my-2"
                data-bs-dismiss="modal">Continuar</button>
        </div>
    </div>
</ng-template>

<!-- ALERTA ERROR -->
<ng-template #erroralert let-modal>
    <div class="modal-filled bg-danger">
        <div class="modal-body p-4 text-center text-white">
            <i class="ti ti-alert-circle h1"></i>
            <h4 class="mt-2">Ocurrió un error</h4>
            <p class="mt-3">{{ errorMessage }}</p>
            <button (click)="modal.dismiss()" type="button" class="btn btn-light my-2"
                data-bs-dismiss="modal">Cerrar</button>
        </div>
    </div>
</ng-template>
